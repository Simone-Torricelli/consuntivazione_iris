name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Flutter project
        id: locate
        shell: bash
        run: |
          FLUTTER_DIR=$(dirname "$(find . -maxdepth 4 -name pubspec.yaml | head -n1)")
          if [[ -z "$FLUTTER_DIR" ]]; then
            echo "Nessun pubspec.yaml trovato nel repository."
            exit 1
          fi
          # Normalizza "./" -> "."
          if [[ "$FLUTTER_DIR" == "./" ]]; then
            FLUTTER_DIR="."
          fi
          echo "flutter_dir=$FLUTTER_DIR" >> "$GITHUB_OUTPUT"
          echo "Flutter project directory: $FLUTTER_DIR"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: ${{ steps.locate.outputs.flutter_dir }}
        run: flutter pub get

      - name: Compute base href
        id: base
        shell: bash
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base_href=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_href=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web
        working-directory: ${{ steps.locate.outputs.flutter_dir }}
        run: flutter build web --release --base-href "${{ steps.base.outputs.base_href }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate.outputs.flutter_dir }}/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
