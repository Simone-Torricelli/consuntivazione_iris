name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Compute base href
        id: base
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY#*/}" == *.github.io ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web
        run: |
          flutter build web --release \
            --base-href "${{ steps.base.outputs.value }}" \
            --dart-define=FIREBASE_WEB_API_KEY="${{ vars.FIREBASE_WEB_API_KEY }}" \
            --dart-define=FIREBASE_WEB_APP_ID="${{ vars.FIREBASE_WEB_APP_ID }}" \
            --dart-define=FIREBASE_WEB_MESSAGING_SENDER_ID="${{ vars.FIREBASE_WEB_MESSAGING_SENDER_ID }}" \
            --dart-define=FIREBASE_WEB_PROJECT_ID="${{ vars.FIREBASE_WEB_PROJECT_ID }}" \
            --dart-define=FIREBASE_WEB_AUTH_DOMAIN="${{ vars.FIREBASE_WEB_AUTH_DOMAIN }}" \
            --dart-define=FIREBASE_WEB_STORAGE_BUCKET="${{ vars.FIREBASE_WEB_STORAGE_BUCKET }}" \
            --dart-define=FIREBASE_WEB_MEASUREMENT_ID="${{ vars.FIREBASE_WEB_MEASUREMENT_ID }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
